name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Generate Gradle wrapper
        run: |
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug 2>&1 | tee /tmp/build.log; echo "EXIT=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: Commit build log on failure
        if: env.EXIT != '0'
        run: |
          cp /tmp/build.log build_error.log
          git config user.email "ci@github.com"
          git config user.name "CI"
          git add build_error.log
          git commit -m "ci: build error log [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail if build failed
        if: env.EXIT != '0'
        run: exit 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: snake-game-apk
          path: app/build/outputs/apk/debug/*.apk
